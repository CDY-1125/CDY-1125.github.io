<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승환물산 — 사진 모으기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #1a2a3a;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #dde3ea;
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-divider { width: 1px; height: 28px; background: #dde3ea; }
  .header-brand h1 { font-size: 16px; font-weight: 700; color: #1a2a3a; letter-spacing: -0.3px; }
  .header-brand p { font-size: 11px; color: #7a8fa6; margin-top: 1px; }
  .header-badge {
    background: #e8f0fe;
    color: #1a56c4;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #c5d8fc;
  }

  main { max-width: 640px; margin: 2rem auto; padding: 0 1rem 4rem; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #7a8fa6;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid #dde3ea;
  }

  .drop-zone {
    border: 1.5px dashed #b8c8d8;
    border-radius: 10px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f8fafc;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #1a56c4;
    background: #f0f4ff;
  }
  .drop-icon {
    width: 48px; height: 48px;
    background: #e8f0fe;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 22px;
  }
  .drop-zone h3 { font-size: 15px; font-weight: 600; color: #1a2a3a; margin-bottom: 5px; }
  .drop-zone p { font-size: 13px; color: #7a8fa6; }

  .thumb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px; margin-top: 1rem;
  }
  .thumb-wrap {
    position: relative; border-radius: 8px; overflow: hidden;
    aspect-ratio: 1; background: #f0f4f8; border: 1px solid #dde3ea;
  }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-num {
    position: absolute; top: 5px; left: 5px;
    background: #1a56c4; color: #fff;
    font-size: 10px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .thumb-del {
    position: absolute; top: 5px; right: 5px;
    background: rgba(0,0,0,0.45); color: #fff;
    border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 13px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .layout-row { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .layout-btn {
    flex: 1; padding: 8px 4px;
    border-radius: 8px;
    border: 1.5px solid #dde3ea;
    background: #fff;
    font-size: 12px; font-weight: 500;
    cursor: pointer; color: #4a6070;
    transition: all 0.15s;
    text-align: center;
  }
  .layout-btn .icon { font-size: 16px; display: block; margin-bottom: 3px; }
  .layout-btn.active {
    border-color: #1a56c4;
    background: #f0f4ff;
    color: #1a56c4;
  }

  .slider-wrap { margin-bottom: 0.25rem; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .slider-header label { font-size: 13px; color: #4a6070; font-weight: 500; }
  .slider-header span { font-size: 13px; font-weight: 700; color: #1a2a3a; }
  input[type=range] { width: 100%; accent-color: #1a56c4; margin-bottom: 4px; }
  .slider-ticks { display: flex; justify-content: space-between; font-size: 11px; color: #a0b0c0; }

  #status-bar {
    font-size: 13px; color: #7a8fa6;
    min-height: 18px; margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 6px;
  }
  #status-bar.ready { color: #0d7a3e; }
  #status-bar.error { color: #c0392b; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #b8c8d8; flex-shrink: 0;
  }
  #status-bar.ready .status-dot { background: #0d7a3e; }
  #status-bar.error .status-dot { background: #c0392b; }

  .btn-merge {
    width: 100%; padding: 0.9rem;
    border-radius: 10px; border: none;
    background: #1a56c4; color: #fff;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    letter-spacing: -0.2px;
  }
  .btn-merge:hover { background: #1444a0; }
  .btn-merge:active { transform: scale(0.99); }
  .btn-merge:disabled { background: #c5d8fc; color: #fff; cursor: not-allowed; }

  .result-card { display: none; }
  .result-preview {
    border-radius: 10px; overflow: hidden;
    border: 1px solid #dde3ea; margin-bottom: 1rem;
  }
  .result-preview img { width: 100%; display: block; }
  .result-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .filesize-pill {
    background: #f0f4f8; border: 1px solid #dde3ea;
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: #4a6070; font-weight: 500;
  }
  .btn-download {
    width: 100%; padding: 0.9rem;
    border-radius: 10px;
    border: 1.5px solid #1a56c4;
    background: #fff; color: #1a56c4;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-download:hover { background: #f0f4ff; }

  footer {
    text-align: center; padding: 1.5rem 1rem;
    font-size: 11px; color: #a0b0c0;
    border-top: 1px solid #dde3ea;
    margin-top: 2rem;
  }
  input[type=file] { display: none; }
</style>
</head>

<main>
  <div class="section-label">사진 선택</div>
  <div class="card">
    <input type="file" id="fileInput" multiple accept="image/*">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">🖼️</div>
      <h3>사진을 여기에 끌어다 놓거나 클릭해서 선택</h3>
      <p>여러 장 한번에 선택 가능</p>
    </div>
    <div class="thumb-grid" id="thumbGrid"></div>
  </div>

  <div class="section-label">설정</div>
  <div class="card">
    <div style="margin-bottom:1.25rem">
      <div style="font-size:13px; color:#4a6070; font-weight:500; margin-bottom:8px">배치 방식</div>
      <div class="layout-row">
        <button class="layout-btn active" onclick="setLayout('grid',this)">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:block;margin:0 auto 4px;">
            <rect x="3" y="3" width="10" height="10" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="15" y="3" width="10" height="10" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="3" y="15" width="10" height="10" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="15" y="15" width="10" height="10" rx="2" fill="currentColor" opacity="0.8"/>
          </svg>
          격자
        </button>
        <button class="layout-btn" onclick="setLayout('row',this)">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:block;margin:0 auto 4px;">
            <rect x="2" y="9" width="7" height="10" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="11" y="9" width="7" height="10" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="20" y="9" width="7" height="10" rx="2" fill="currentColor" opacity="0.8"/>
          </svg>
          가로 1줄
        </button>
        <button class="layout-btn" onclick="setLayout('col',this)">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:block;margin:0 auto 4px;">
            <rect x="9" y="2" width="10" height="7" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="9" y="11" width="10" height="7" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="9" y="20" width="10" height="7" rx="2" fill="currentColor" opacity="0.8"/>
          </svg>
          세로 1줄
        </button>
      </div>
    </div>

    <div style="margin-top:0.25rem;">
      <div style="font-size:13px; color:#4a6070; font-weight:500; margin-bottom:8px;">화질 설정</div>
      <div class="layout-row">
        <button class="layout-btn" onclick="setQuality('normal',this)">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:block;margin:0 auto 4px;">
            <rect x="3" y="3" width="22" height="22" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M3 19 L9 13 L14 17 L19 11 L25 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="10" r="2.5" fill="currentColor" opacity="0.7"/>
          </svg>
          보통
        </button>
        <button class="layout-btn active" onclick="setQuality('high',this)">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:block;margin:0 auto 4px;">
            <rect x="3" y="3" width="22" height="22" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M3 19 L9 13 L14 17 L19 11 L25 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="10" r="2.5" fill="currentColor" opacity="0.7"/>
            <circle cx="22" cy="5" r="4" fill="currentColor" opacity="0.9"/>
            <path d="M20.5 5 L21.5 6.2 L23.8 3.5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          고화질
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">사진을 2장 이상 선택해주세요</span>
    </div>
    <button class="btn-merge" id="mergeBtn" disabled onclick="mergeImages()">
      사진 합치기
    </button>
  </div>

  <div class="card result-card" id="resultCard">
    <div class="section-label" style="margin-bottom:0.75rem">완성된 사진</div>
    <div class="result-meta">
      <div class="filesize-pill" id="filesizeBadge">계산 중...</div>
    </div>
    <div class="result-preview">
      <img id="resultImg" alt="합쳐진 결과 사진">
    </div>
    <div style="margin-bottom:0.75rem; background:#f0f4ff; border:1.5px solid #c5d8fc; border-radius:12px; padding:1rem;">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
        <span style="font-size:15px;">✏️</span>
        <span style="font-size:13px; font-weight:700; color:#1a56c4;">저장할 파일명을 입력해주세요</span>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <input type="text" id="fileNameInput"
          style="flex:1; padding:10px 14px; border:2px solid #1a56c4; border-radius:8px; font-size:14px; font-weight:500; color:#1a2a3a; outline:none; background:#fff;"
          placeholder="예) 화주-제품명"
          onfocus="this.style.boxShadow='0 0 0 3px rgba(26,86,196,0.15)'"
          onblur="this.style.boxShadow='none'">
        <span style="font-size:14px; color:#1a56c4; white-space:nowrap; font-weight:700;">.jpg</span>
      </div>
      <div style="font-size:11px; color:#7a8fa6; margin-top:6px;">비워두면 날짜로 자동 저장돼요</div>
    </div>
    <button class="btn-download" onclick="downloadResult()">
      ⬇︎ 다운로드
    </button>
  </div>
</main>

<footer>
  <div style="margin-bottom:1rem; font-size:11px; color:#a0b0c0;">통관사진 체크리스트</div>
  <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
    <label style="display:flex; align-items:center; gap:6px; background:#f0f4ff; border:1px solid #c5d8fc; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:#1a56c4; cursor:pointer;">
      <input type="checkbox" style="accent-color:#1a56c4; width:13px; height:13px;"> 📦 제품전면
    </label>
    <label style="display:flex; align-items:center; gap:6px; background:#f0f4ff; border:1px solid #c5d8fc; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:#1a56c4; cursor:pointer;">
      <input type="checkbox" style="accent-color:#1a56c4; width:13px; height:13px;"> 📦 제품후면
    </label>
    <label style="display:flex; align-items:center; gap:6px; background:#f0f4ff; border:1px solid #c5d8fc; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:#1a56c4; cursor:pointer;">
      <input type="checkbox" style="accent-color:#1a56c4; width:13px; height:13px;"> 🏷️ 한글표기사항
    </label>
    <label style="display:flex; align-items:center; gap:6px; background:#f0f4ff; border:1px solid #c5d8fc; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:#1a56c4; cursor:pointer;">
      <input type="checkbox" style="accent-color:#1a56c4; width:13px; height:13px;"> 📅 제조일자
    </label>
    <label style="display:flex; align-items:center; gap:6px; background:#f0f4ff; border:1px solid #c5d8fc; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:#1a56c4; cursor:pointer;">
      <input type="checkbox" style="accent-color:#1a56c4; width:13px; height:13px;"> 📷 촬영일자
    </label>
  </div>
</footer>

<script>
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const thumbGrid = document.getElementById("thumbGrid");
const mergeBtn = document.getElementById("mergeBtn");
const resultCard = document.getElementById("resultCard");
const resultImg = document.getElementById("resultImg");
const statusEl = document.getElementById("status-bar");
const statusText = document.getElementById("status-text");
let files = [], layout = "grid", resultDataUrl = null;

let qualityMode = "high";
function setQuality(mode, btn) {
  qualityMode = mode;
  document.querySelectorAll(".layout-btn").forEach(b => {
    if (b.onclick && b.onclick.toString().includes("setQuality")) b.classList.remove("active");
  });
  btn.classList.add("active");
}
function setStatus(msg, type) {
  statusText.textContent = msg;
  statusEl.className = type || "";
}

dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"))); });
fileInput.addEventListener("change", e => addFiles(Array.from(e.target.files)));

function addFiles(newFiles) {
  files = [...files, ...newFiles];
  renderThumbs();
  mergeBtn.disabled = files.length < 2;
  resultCard.style.display = "none";
  if (files.length === 0) setStatus("사진을 2장 이상 선택해주세요");
  else if (files.length === 1) setStatus("사진을 1장 더 추가해주세요");
  else setStatus(files.length + "장 선택됨 — 합치기 버튼을 눌러주세요", "ready");
}

function renderThumbs() {
  thumbGrid.innerHTML = "";
  files.forEach((f, i) => {
    const wrap = document.createElement("div"); wrap.className = "thumb-wrap";
    const img = document.createElement("img"); img.src = URL.createObjectURL(f);
    const num = document.createElement("div"); num.className = "thumb-num"; num.textContent = i + 1;
    const del = document.createElement("button"); del.className = "thumb-del"; del.textContent = "×";
    del.setAttribute("aria-label", "사진 제거");
    del.onclick = () => { files.splice(i, 1); renderThumbs(); mergeBtn.disabled = files.length < 2; if(files.length < 2) setStatus("사진을 2장 이상 선택해주세요"); };
    wrap.appendChild(img); wrap.appendChild(num); wrap.appendChild(del);
    thumbGrid.appendChild(wrap);
  });
}

function setLayout(l, btn) {
  layout = l;
  document.querySelectorAll(".layout-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function loadImage(f) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(f);
  });
}

function drawCanvas(imgs, maxW) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const n = imgs.length;
  if (layout === "row") {
    const totalRatio = imgs.reduce((s, img) => s + img.naturalWidth / img.naturalHeight, 0);
    const h = Math.round(maxW / totalRatio);
    canvas.width = maxW; canvas.height = h;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    let x = 0;
    imgs.forEach(img => {
      const w = Math.round(h * img.naturalWidth / img.naturalHeight);
      ctx.drawImage(img, x, 0, w, h); x += w;
    });
  } else if (layout === "col") {
    const maxRatio = Math.max(...imgs.map(img => img.naturalWidth / img.naturalHeight));
    const cellH = Math.round(maxW / maxRatio);
    canvas.width = maxW; canvas.height = cellH * n;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    imgs.forEach((img, i) => ctx.drawImage(img, 0, i * cellH, maxW, cellH));
  } else {
    const cols = n <= 2 ? 2 : n <= 4 ? 2 : 3;
    const rows = Math.ceil(n / cols);
    const cellW = Math.round(maxW / cols);
    canvas.width = maxW;
    let totalH = 0;
    const rowHeights = [];
    for (let r = 0; r < rows; r++) {
      let maxH = 0;
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        if (idx < imgs.length) {
          const h = Math.round(cellW * imgs[idx].naturalHeight / imgs[idx].naturalWidth);
          if (h > maxH) maxH = h;
        }
      }
      rowHeights.push(maxH); totalH += maxH;
    }
    canvas.height = totalH;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    let y = 0;
    for (let r = 0; r < rows; r++) {
      const cellH = rowHeights[r];
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        if (idx < imgs.length) {
          const img = imgs[idx];
          const drawW = Math.round(cellH * img.naturalWidth / img.naturalHeight);
          const x = c * cellW + Math.round((cellW - drawW) / 2);
          ctx.drawImage(img, x, y, drawW, cellH);
        }
      }
      y += rowHeights[r];
    }
  }
  return canvas;
}

async function findQualityForTargetSize(canvas, targetBytes) {
  let lo = 0.01, hi = 1.0, bestUrl = null;
  for (let i = 0; i < 10; i++) {
    const mid = (lo + hi) / 2;
    const url = canvas.toDataURL("image/jpeg", mid);
    const bytes = Math.round(url.length * 0.75);
    if (Math.abs(bytes - targetBytes) < targetBytes * 0.05) { bestUrl = url; break; }
    if (bytes < targetBytes) lo = mid; else hi = mid;
    bestUrl = url;
  }
  return bestUrl;
}

async function mergeImages() {
  if (files.length < 2) return;
  mergeBtn.disabled = true;
  setStatus("사진 합치는 중...");
  const targetBytes = qualityMode === "high" ? Infinity : 5 * 1024 * 1024;
  try {
    const imgs = await Promise.all(files.map(loadImage));
    const canvas = drawCanvas(imgs, 3600);

    // 최대 품질로 만들 수 있는 최대 크기 계산
    setStatus("최대 크기 계산 중...");
    const maxUrl = canvas.toDataURL("image/jpeg", 1.0);
    const maxBytes = Math.round(maxUrl.length * 0.75);
    const maxMB = parseFloat((maxBytes / 1024 / 1024).toFixed(1));

    const actualTargetBytes = Math.min(targetBytes, maxBytes);
    setStatus("파일 크기 맞추는 중...");
    resultDataUrl = await findQualityForTargetSize(canvas, actualTargetBytes);
    resultImg.src = resultDataUrl;
    resultCard.style.display = "block";
    const actualKB = Math.round(resultDataUrl.length * 0.75 / 1024);
    const actualMB = (actualKB / 1024).toFixed(1);
    document.getElementById("filesizeBadge").textContent = "파일 크기: 약 " + actualMB + " MB (" + actualKB + " KB)";
    setStatus("완료! 아래에서 다운로드 해주세요 ✓", "ready");
    resultCard.scrollIntoView({ behavior: "smooth" });
  } catch(e) {
    setStatus("오류가 발생했어요. 사진 형식을 확인해주세요.", "error");
  }
  mergeBtn.disabled = false;
}

function downloadResult() {
  if (!resultDataUrl) return;
  const d = new Date();
  const inputName = document.getElementById("fileNameInput").value.trim();
  const fileName = (inputName || "승환물산_통관사진_" + d.toISOString().slice(0,10)) + ".jpg";
  const byteStr = atob(resultDataUrl.split(",")[1]);
  const ab = new ArrayBuffer(byteStr.length);
  const ia = new Uint8Array(ab);
  for (let i = 0; i < byteStr.length; i++) ia[i] = byteStr.charCodeAt(i);
  const blob = new Blob([ab], { type: "image/jpeg" });

  // 엣지(msSaveBlob) 지원
  if (window.navigator && window.navigator.msSaveBlob) {
    window.navigator.msSaveBlob(blob, fileName);
    return;
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.style.display = "none";
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 2000);
}
</script>
</body>
</html>
